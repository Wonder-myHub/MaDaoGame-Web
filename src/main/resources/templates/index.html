<!DOCTYPE html>
<!--
  文件名: index.html
  作用: 游戏首页 — 提供"创建房间"和"加入房间"两个入口表单，以及游戏规则弹窗
  路由: GET /  (由 GameController.index() 返回)
  页面功能:
    1. 创建房间表单 — 输入昵称+玩家数量(2~6人)，POST /create
    2. 加入房间表单 — 输入房间ID+昵称，POST /join
    3. 规则弹窗 — 点击右上角"规则"按钮弹出，点击外部关闭
    4. 错误提示 — 通过 Thymeleaf th:if 条件渲染，由后端重定向时附带 error 参数显示
-->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>马刀游戏 - 首页</title>
    <link rel="stylesheet" href="/css/common.css">
    <script src="/js/common.js"></script>
    <style>
        body { background: #f5f5f5; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .form-section { margin-bottom: 30px; }
        .form-section h2 { color: #34495e; font-size: 20px; margin-bottom: 15px; }
        .form-section input, .form-section button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; font-size: 14px; }
        .form-section button { background: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .form-section button:hover { background: #2980b9; }
        .error { color: red; margin-bottom: 15px; }
    </style>
</head>
<body>

<!-- ========== 规则弹窗区域（引用公共 Thymeleaf 片段） ========== -->
<div th:replace="fragments/rules :: rulesPopup"></div>

<!-- ========== 主内容区：创建房间 + 加入房间 ========== -->
<div class="container">
    <h1>⚔️ 马刀游戏</h1>

    <!--
      Thymeleaf 条件渲染：仅当后端传入了 error 属性时才显示错误信息
      参数说明:
        - ${error}: String 类型，由 Controller 通过 Model.addAttribute("error", msg) 传入
          典型场景：房间不存在时 Controller 重定向到 /?error=房间不存在
          对应 Controller: GameController.index() 接收 @RequestParam(required=false) String error
      渲染逻辑:
        - th:if="${error}": error 非 null 且非空时渲染此 div
        - th:text="${error}": 将 error 值设置为 div 的文本内容
        - class="error": 红色文字样式
    -->
    <div th:if="${error}" class="error" th:text="${error}"></div>

    <!-- ===== 创建房间表单 ===== -->
    <!--
      提交到 POST /create，由 GameController.createRoom() 处理
      表单参数:
        - name (String, required): 玩家昵称，用于在游戏中显示
          后端绑定: @RequestParam String name → 创建 Player 对象时设置 name 字段
        - count (int, required, min=2, max=6): 目标玩家数量
          后端绑定: @RequestParam int count → 创建 GameRoom 时设置 playerCount 字段
          HTML 限制: min="2" max="6" 浏览器端校验，默认值 value="2"
      成功后重定向: /lobby/{roomId}/{playerId}
      失败后重定向: /?error=错误信息
    -->
    <div class="form-section">
        <h2>创建房间</h2>
        <form th:action="@{/create}" method="post">
            <input type="text" name="name" placeholder="你的昵称" maxlength="50" required>
            <input type="number" name="count" min="2" max="6" value="2" placeholder="玩家数量" required>
            <button type="submit">创建并加入</button>
        </form>
    </div>

    <!-- ===== 加入房间表单 ===== -->
    <!--
      提交到 POST /join，由 GameController.joinRoom() 处理
      表单参数:
        - roomId (String, required): 要加入的房间ID，由房主从等待大厅复制分享
          后端绑定: @RequestParam String roomId → 调用 GameService 查找对应 GameRoom
          校验: 如果房间不存在或已满，重定向回 /?error=...
        - name (String, required): 玩家昵称，用于在游戏中显示
          后端绑定: @RequestParam String name → 创建 Player 对象时设置 name 字段
      成功后重定向: /lobby/{roomId}/{playerId}
      失败后重定向: /?error=错误信息（如"房间不存在"、"房间已满"）
    -->
    <div class="form-section">
        <h2>加入房间</h2>
        <form th:action="@{/join}" method="post">
            <input type="text" name="roomId" placeholder="房间 ID" required>
            <input type="text" name="name" placeholder="你的昵称" maxlength="50" required>
            <button type="submit">加入</button>
        </form>
    </div>
</div>

<!-- ========== 规则弹窗交互（使用 common.js，无需重复定义） ========== -->
<script>
    // 首页无 roomId，使用 'global' 作为 sessionStorage key 后缀
    restoreRulesPopup();
</script>
</body>
</html>
