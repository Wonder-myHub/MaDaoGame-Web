<!DOCTYPE html>
<!--
  ================================================================================
  文件: spectate.html - 马刀游戏 · 观战页面
  ================================================================================

  【路由信息】
  请求路径: GET /game/{roomId}/{playerId}
  对应Controller: GameController.gamePage()
  分发条件: 当玩家已死亡（player.hp <= 0 或 player.alive == false）
  -> 死亡玩家无法参与游戏，只能观看其他玩家对战

  【页面功能】
  1. 只读展示所有玩家状态（HP、位置、装备、步数、血祭buff）
  2. 实时显示操作记录（actionLogs）
  3. 支持观看聊天消息并发送消息（死亡玩家仍可聊天）
  4. 游戏结束时自动跳转到结果页
  5. 支持"退出观战"离开房间
  6. 规则弹窗查看游戏规则

  【后端注入变量（Thymeleaf Model 属性）】
  ${roomId}  : String - 当前房间ID（UUID），来源: GameController model.addAttribute("roomId", roomId)
  ${playerId} : String - 当前玩家ID（UUID），来源: GameController model.addAttribute("playerId", playerId)

  【前端行为总览】
  - 页面加载时调用 fetchState() 获取游戏状态
  - smartPoll(fetchState, 4000) 每4秒轮询（后台自动暂停）
  - 仅更新展示数据（players/actionLogs/chatMessages），不参与游戏操作
  - 游戏结束 (status=='FINISHED') 时自动跳转到结果页 /game/{roomId}/{playerId}
  - 房间不存在时跳转到首页 /
  - 使用 sessionStorage 保存规则弹窗展开/收起状态

  【与 action.html 的关键区别】
  - 没有行动操作区域（#actionArea/#waitMessage）
  - 没有行动按钮、目标选择、城市选择等交互元素
  - 没有 pendingAction 状态管理
  - 顶部有"退出观战"按钮（离开房间）
  - 提示文字："你已出局，现在正在观看其他玩家对战"
  - 使用暗色主题（深蓝渐变背景 + 金色边框）

  ================================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <!--
      charset: UTF-8 统一字符编码，确保中文/emoji 正常显示
    -->
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>马刀游戏 - 观战</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        /* ===== 观战页面专属样式 ===== */
        /* body: 暗色渐变背景 (深蓝 #1a1a2e -> #16213e -> #0f3460)，白色文字 */
        /* .top-bar: 顶部导航栏，flexbox 两端对齐，左侧退出按钮+右侧规则按钮 */
        /* .exit-btn: 退出观战按钮，红色背景 (#e74c3c) */
        /* .exit-btn:hover: 悬停时深红色 */
        /* .rules-container: 规则弹窗容器，position:relative 用于内部子元素定位 */
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: white;
        }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .exit-btn { padding: 8px 16px; background: #e74c3c; color: white; border: none; border-radius: 4px; text-decoration: none; font-size: 14px; }
        .exit-btn:hover { background: #c0392b; }
        /* spectate 页面规则容器在 .top-bar 内，使用 relative 定位 */
        .rules-container { position: relative; }
    </style>
</head>
<body class="dark-theme">

<!--
  ==================== 顶部导航栏 ====================
  布局: 左侧"退出观战"按钮 | 右侧"规则"按钮
  使用 flexbox space-between 两端对齐
-->
<div class="top-bar">
    <!--
      "退出观战"链接 — 离开房间
      th:href: Thymeleaf 链接表达式
        @{/leave/{roomId}/{playerId}(roomId=${roomId}, playerId=${playerId})}
        渲染后如: /leave/a1b2c3d4.../e5f6g7h8...
      效果: 从房间中移除该玩家，跳转回首页 /
    -->
    <a th:href="@{/leave/{roomId}/{playerId}(roomId=${roomId}, playerId=${playerId})}" class="exit-btn">退出观战</a>

    <!--
      ===== 规则弹窗（引用公共 Thymeleaf 片段） =====
      与 action.html 相同的规则弹窗，配色适配暗色背景
    -->
    <div th:replace="~{fragments/rules :: rulesPopup}"></div>
</div>

<!--
  观战提示文字
  color: #aaa — 浅灰色，低调提示
  内容告知玩家已出局，正在观看其他玩家对战
-->
<p style="color: #aaa;">你已出局，现在正在观看其他玩家对战。页面自动刷新。</p>

<!--
  ==================== 玩家状态面板 ====================
  由 updatePlayers(data.players) 动态渲染
  data.players 来源: GET /api/room/{roomId}?playerId={playerId} 响应中的 players 数组
  显示所有玩家的实时状态（含存活和死亡玩家）
-->
<div class="status-box">
    <h4>📋 玩家状态</h4>
    <div class="players-container" id="playersContainer">
        <p>加载中...</p>
    </div>
</div>

<!--
  ==================== 操作记录面板 ====================
  由 updateLogs(data.actionLogs) 动态渲染
  data.actionLogs: List<String> — 行动日志（最多30条）
  带粘性标题 + 滚动区，新消息自动滚到底部
  深度比较机制：不仅比较数量，还逐条比较内容，确保内容变化时也能更新
-->
<div class="log-box">
    <h4>📜 操作记录</h4>
    <div class="log-scroll" id="logScroll">
        <ul id="logList"></ul>
    </div>
</div>

<!--
  ==================== 聊天面板 ====================
  由 updateChat(data.chatMessages) 动态渲染
  data.chatMessages: List<String> — 聊天消息（最多50条）
  死亡玩家仍可发送聊天消息（观战不剥夺聊天权）
-->
<div class="chat-box">
    <h4>💬 聊天</h4>
    <div class="chat-scroll" id="chatScroll">
        <ul id="chatList"></ul>
    </div>
    <!--
      id="chatForm" — 聊天表单
      POST /api/chat/{roomId}/{playerId}，参数 message (FormData)
    -->
    <form id="chatForm" class="chat-form">
        <input type="text" id="chatInput" placeholder="输入消息..." required autocomplete="off" style="width:70%;">
        <button type="submit">发送</button>
    </form>
</div>

<!--
  ===================================================================
  页面交互脚本（Thymeleaf 内联模式）
  th:inline="javascript" 启用 Thymeleaf JS 内联，支持 /*[[...]]*/ 语法
  ===================================================================
-->
<script th:inline="javascript" src="/js/common.js"></script>
<script th:inline="javascript">

    var roomId = /*[[${roomId}]]*/ '';
    var playerId = /*[[${playerId}]]*/ '';

    var fetchState = createRoomPoller({
        shouldRedirect: function(data) {
            return data.status === 'FINISHED';
        }
    });

    initChatForm();
    restoreRulesPopup();
    fetchState();
    smartPoll(fetchState, 4000);
</script>
</body>
</html>
