<!--
  ============================================================================
  模板文件: waiting.html
  路由: GET /game/{roomId}/{playerId} （由 GameController 根据状态分发到此模板）
  功能: 通用等待页面 —— 当玩家处于以下两种情况之一时显示：
          1. GUESS 阶段：自己已出拳，等待其他未出拳玩家
          2. ACTION 阶段：自己无步数（不在行动队列中），等待其他有步数玩家行动
        通过 AJAX 轮询检测状态变化，自动跳转到对应页面。
  
  后端传入变量（通过 Model.addAttribute）:
    - roomId:   String   — 房间 UUID（36位），从路径变量 @PathVariable 注入
    - playerId: String   — 玩家 UUID（36位），从路径变量 @PathVariable 注入
  
  前端 JS 行为:
    - 每 2 秒 AJAX 轮询 GET /api/room/{roomId}?playerId={playerId}
    - 根据返回数据判断：
        · 房间不存在 → 跳回首页 "/"
        · 游戏结束   → 跳转 /game/{roomId}/{playerId}（Controller 分发到 result.html）
        · 自己死亡   → 跳转 /game/{roomId}/{playerId}（Controller 分发到 spectate.html）
        · GUESS + 自己未出拳 → 跳转猜拳页 guess.html
        · ACTION + 轮到自己 → 跳转行动页 action.html
        · 其他情况 → 更新等待信息 + 继续轮询
    - 规则弹窗状态通过 sessionStorage 持久化，避免刷新后关闭
  ============================================================================
-->
<!DOCTYPE html>
<!-- xmlns:th 声明 Thymeleaf 命名空间，用于服务端模板渲染 -->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- 字符编码：UTF-8 保证中文正常显示，兼容所有浏览器 -->
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>马刀游戏 - 等待中</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .wait-detail { margin: 15px 0; font-size: 16px; }
    </style>
</head>
<body>

<!-- ========== 规则弹窗（引用公共 Thymeleaf 片段） ========== -->
<div th:replace="~{fragments/rules :: rulesPopup}"></div>

<!--
  ==================== 玩家状态面板 ====================
  显示所有玩家的实时状态：名称、马/刀持有、血量、位置、步数、血祭buff
  由 JS 函数 updatePlayers() 动态渲染，初始显示"加载中..."
-->
<div class="status-box">
    <h4>📋 玩家状态</h4>
    <!--
      id="playersContainer": 玩家卡片容器
      内容由 JS 动态生成，初始为加载提示
    -->
    <div class="players-container" id="playersContainer">
        <p>加载中...</p>
    </div>
</div>

<!--
  ==================== 等待提示区域 ====================
  id="waitMessage": 主等待标题，动态更新文字
    - GUESS阶段 → "等待其他玩家猜拳..."
    - ACTION阶段 → "等待其他玩家行动..."
  id="waitDetail": 等待详情，显示具体等待谁
    - GUESS阶段 → 列出未出拳玩家名单
    - ACTION阶段 → 显示当前行动玩家名 + 剩余步数
-->
<h2 id="waitMessage">等待中...</h2>
<div class="wait-detail" id="waitDetail"></div>

<!--
  ==================== 操作记录面板 ====================
  显示游戏中的操作日志（攻击、移动、购买等）
  内容由 JS 函数 updateLogs() 动态渲染，自动滚动到底部
-->
<div class="log-box">
    <h4>📜 操作记录</h4>
    <!--
      id="logScroll": 滚动容器，max-height:200px
      id="logList": 日志列表 ul 元素
    -->
    <div class="log-scroll" id="logScroll">
        <ul id="logList"></ul>
    </div>
</div>

<!--
  ==================== 聊天面板 ====================
  显示聊天消息 + 输入框发送新消息
  消息由 JS 函数 updateChat() 动态渲染
  发送通过 fetch POST /api/chat/{roomId}/{playerId}
-->
<div class="chat-box">
    <h4>💬 聊天</h4>
    <!--
      id="chatScroll": 聊天消息滚动容器，max-height:150px
      id="chatList": 聊天消息列表 ul 元素
    -->
    <div class="chat-scroll" id="chatScroll">
        <ul id="chatList"></ul>
    </div>
    <!--
      聊天输入表单
      id="chatForm": 表单，通过 submit 事件监听发送消息
      id="chatInput": 文本输入框
        - placeholder="输入消息..." — 占位提示文字
        - required — 必填验证
        - autocomplete="off" — 禁用自动补全
        - style="width:70%;" — 宽度占父容器70%
    -->
    <form id="chatForm" class="chat-form">
        <input type="text" id="chatInput" placeholder="输入消息..." required autocomplete="off" style="width:70%;">
        <button type="submit">发送</button>
    </form>
</div>

<!--
  ==================== JavaScript: 核心逻辑 ====================
  
  包含四大模块：
    1. 规则弹窗控制（sessionStorage 状态持久化）
    2. 游戏状态 AJAX 轮询（每2秒）
    3. UI 更新函数（玩家/日志/聊天）
    4. 聊天发送
  
  Thymeleaf 内联变量（th:inline="javascript"）:
    通过 /*[[...]]*/ 将后端 Java 变量注入 JS 作用域
-->
<script th:inline="javascript" src="/js/common.js"></script>
<script th:inline="javascript">
    var roomId = /*[[${roomId}]]*/ '';
    var playerId = /*[[${playerId}]]*/ '';

    var fetchState = createRoomPoller({
        shouldRedirect: function(data) {
            if (data.status === 'FINISHED') return true;
            if (!data.currentPlayerAlive) return true;
            if (data.phase === 'GUESS' && data.currentPlayerGuess == null) return true;
            if (data.phase === 'ACTION' && data.isCurrentActionPlayer && data.currentPlayerSteps > 0) return true;
            return false;
        },
        onUpdate: function(data) {
            if (data.phase === 'GUESS') {
                document.getElementById('waitMessage').textContent = '等待其他玩家猜拳...';
                var detailDiv = document.getElementById('waitDetail');
                if (data.playersNotGuessed && data.playersNotGuessed.length > 0) {
                    var items = data.playersNotGuessed.map(function(n) { return '<li>' + escapeHtml(n) + '</li>'; }).join('');
                    detailDiv.innerHTML = '<p>等待以下玩家出拳：</p><ul>' + items + '</ul>';
                } else { detailDiv.innerHTML = ''; }
            } else if (data.phase === 'ACTION') {
                document.getElementById('waitMessage').textContent = '等待其他玩家行动...';
                var detailDiv = document.getElementById('waitDetail');
                if (data.currentActionPlayer) {
                    var detail = '<p>正在等待 <strong>' + escapeHtml(data.currentActionPlayer) + '</strong> 行动';
                    if (data.currentActionSteps > 0) detail += '（剩余 ' + data.currentActionSteps + ' 步）</p>';
                    else detail += '</p>';
                    detailDiv.innerHTML = detail;
                } else { detailDiv.innerHTML = ''; }
            }
        }
    });

    initChatForm();
    restoreRulesPopup();
    fetchState();
    smartPoll(fetchState, 3000);
</script>
</body>
</html>
