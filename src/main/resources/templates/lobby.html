<!DOCTYPE html>
<!--
  文件名: lobby.html
  作用: 等待大厅 — 展示房间信息与当前玩家列表，等待其他玩家加入，人数凑齐或房主手动开始后进入游戏
  路由: GET /lobby/{roomId}/{playerId}  (由 GameController.lobby() 返回)
  页面功能:
    1. 显示房间ID（支持一键复制，便于分享给其他玩家）
    2. 显示房间状态、当前人数/目标人数
    3. 每2秒 AJAX 轮询，实时同步玩家加入/离开
    4. 房主可见"直接开始"按钮，无需等待满员即可强制开始游戏
    5. 当房间状态变为 PLAYING 时，自动跳转到游戏页面
    6. "返回首页"链接用于离开房间
-->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>马刀游戏 - 等待大厅</title>
    <link rel="stylesheet" href="/css/common.css">
    <script src="/js/common.js"></script>
    <style>
        /* ===== 等待大厅页面专属样式 ===== */
        /* body: 浅灰背景 */
        /* .container: 白色卡片容器，600px宽，圆角阴影 */
        /* .room-id: 房间ID显示区，浅蓝背景，user-select:all 方便全选复制 */
        /* .copy-btn: 复制按钮，蓝色底 */
        /* .back-link: 返回首页链接，红色警示色 */
        /* .hint: 复制提示，默认隐藏 */
        /* .start-btn: 房主直接开始按钮，绿色 */
        /* .players-list li: 玩家列表项，底部浅灰分割线 */
        body { background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; }
        .room-id { font-size: 18px; margin-bottom: 15px; display: flex; align-items: center; background: #eef; padding: 10px; border-radius: 5px; }
        .room-id strong { margin-right: 10px; user-select: all; }
        .copy-btn { padding: 5px 15px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 4px; }
        .copy-btn:hover { background: #2980b9; }
        .info p { margin: 10px 0; }
        .back-link { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #e74c3c; color: white; text-decoration: none; border-radius: 5px; }
        .back-link:hover { background: #c0392b; }
        .hint { color: #666; font-size: 14px; margin-left: 10px; display: none; }
        .start-btn { padding: 10px 20px; background: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin: 10px 0; }
        .start-btn:hover { background: #27ae60; }
        .error-msg { color: red; margin: 10px 0; }
        .players-list { margin: 10px 0; }
        .players-list li { padding: 5px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<!-- ========== 规则弹窗（引用公共 Thymeleaf 片段） ========== -->
<div th:replace="~{fragments/rules :: rulesPopup}"></div>

<!-- ========== 主内容区 ========== -->
<div class="container">
    <h1>等待大厅</h1>

    <p class="room-id">
        房间ID：<strong id="roomIdText" th:text="${room.id}"></strong>
        <button class="copy-btn" id="copyBtn">复制</button>
        <span id="copyHint" class="hint">👉 按 Ctrl+C 复制</span>
    </p>

    <div class="info">
        <p>状态：<span id="statusText" th:text="${room.status}"></span></p>
        <p>当前人数：<span id="playerCountText"></span> / <span th:text="${room.playerCount}"></span></p>
        <div id="gameStarting" style="display:none">
            <p>游戏即将开始，正在跳转...</p>
        </div>
        <p style="color:gray">页面每2秒自动刷新，等待其他玩家加入...</p>
    </div>

    <!-- ===== 玩家列表 ===== -->
    <div class="players-list">
        <h4>当前玩家：</h4>
        <ul id="playersList">
            <li>加载中...</li>
        </ul>
    </div>

    <!-- ===== 房主直接开始按钮 ===== -->
    <!-- 房主判断：当前玩家非空、房间玩家列表非空、且当前玩家ID等于列表中第一个玩家（房主）的ID -->
    <div th:if="${player != null and !room.players.isEmpty() and player.id == room.players.get(0).id}">
        <button class="start-btn" onclick="forceStart()">直接开始</button>
        <div id="startError" class="error-msg"></div>
    </div>

    <a th:href="@{/leave/{roomId}/{playerId}(roomId=${roomId}, playerId=${playerId})}" class="back-link">返回首页</a>
</div>

<!-- ========== 页面交互脚本 ========== -->
<script th:inline="javascript">
    var roomId = /*[[${roomId}]]*/ '';
    var playerId = /*[[${playerId}]]*/ '';

    // ===== 复制房间ID（使用 Clipboard API） =====
    document.getElementById('copyBtn').addEventListener('click', function() {
        var roomIdText = document.getElementById('roomIdText').textContent;
        navigator.clipboard.writeText(roomIdText).then(function() {
            var hint = document.getElementById('copyHint');
            hint.textContent = '✓ 已复制！';
            hint.style.display = 'inline';
            hint.style.color = 'green';
            setTimeout(function() { hint.style.display = 'none'; }, 2000);
        }).catch(function() {
            alert("复制失败，请手动复制。");
        });
    });

    // ===== 房主强制开始（增加前端状态检查，避免无效请求） =====
    /**
     * forceStart() — 房主强制开始游戏
     *
     * 功能：发送 POST /lobby/{roomId}/{playerId}/start 请求，强制开始游戏（无需等满员）
     * 前端校验：
     *   1. 游戏已开始 → 直接跳转 /game/{roomId}/{playerId}
     *   2. 人数不足2人 → 显示错误提示
     * 后端校验：仅房主可调用，返回 { success: boolean, error?: string }
     *
     * @async
     * 无参数，无返回值
     * 副作用：成功后跳转到游戏页面，失败时显示错误信息到 #startError
     */
    async function forceStart() {
        var errorDiv = document.getElementById('startError');
        errorDiv.textContent = '';
        // 前端检查：游戏已经开始则直接跳转
        var statusText = document.getElementById('statusText').textContent;
        if (statusText === 'PLAYING') {
            window.location.href = '/game/' + roomId + '/' + playerId;
            return;
        }
        // 前端检查：至少需要2人
        var countText = document.getElementById('playerCountText').textContent;
        if (parseInt(countText) < 2) {
            errorDiv.textContent = '当前人数不足，至少需要2人';
            return;
        }
        try {
            var response = await fetch('/lobby/' + roomId + '/' + playerId + '/start', { method: 'POST' });
            var data = await response.json();
            if (data.success) {
                window.location.href = '/game/' + roomId + '/' + playerId;
            } else {
                errorDiv.textContent = data.error;
            }
        } catch (err) {
            errorDiv.textContent = '请求失败，请稍后重试';
        }
    }

    // ===== AJAX 轮询（替代 meta refresh） =====
    /**
     * pollState() — AJAX 轮询房间状态
     *
     * API 调用: GET /api/room/{roomId}?playerId={playerId}
     * 轮询间隔: 每 3 秒（由 smartPoll(pollState, 3000) 驱动，后台自动暂停）
     *
     * 响应 JSON 结构:
     *   - status:    String  — 房间状态: "WAITING" / "PLAYING" / "FINISHED"
     *   - players:   Array   — 玩家列表 [{id, name, online, ...}]
     *   - playerCount: int   — 目标玩家数
     *
     * 跳转逻辑:
     *   1. !data.status → 房间不存在 → 跳转首页 /
     *   2. data.status === 'PLAYING' → 游戏已开始 → 跳转 /game/{roomId}/{playerId}
     *
     * UI 更新:
     *   - 更新状态文本 (#statusText)
     *   - 更新当前人数 (#playerCountText)
     *   - 渲染玩家列表（含断线标记和"（我）"标记）
     *
     * @async
     * 无参数，无返回值
     * 副作用：更新 DOM 元素、可能触发页面跳转
     */
    async function pollState() {
        try {
            var res = await fetch('/api/room/' + roomId + '?playerId=' + playerId);
            if (!res.ok) return;
            var data = await res.json();
            if (!data.status) { window.location.href = '/'; return; }

            // 更新状态
            document.getElementById('statusText').textContent = data.status;
            document.getElementById('playerCountText').textContent = data.players.length;

            // 游戏已开始 → 跳转
            if (data.status === 'PLAYING') {
                document.getElementById('gameStarting').style.display = 'block';
                window.location.href = '/game/' + roomId + '/' + playerId;
                return;
            }

            // 更新玩家列表
            var listHtml = '';
            for (var i = 0; i < data.players.length; i++) {
                var p = data.players[i];
                listHtml += '<li>' + escapeHtml(p.name)
                         + (p.id === playerId ? '（我）' : '')
                         + (p.online === false ? '<span class="disconnected">(断线)</span>' : '')
                         + '</li>';
            }
            document.getElementById('playersList').innerHTML = listHtml;
            restoreRulesPopup();
        } catch (e) { console.error('轮询失败', e); }
    }

    pollState();
    restoreRulesPopup();
    smartPoll(pollState, 3000);
</script>
</body>
</html>
