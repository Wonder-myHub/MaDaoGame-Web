<!DOCTYPE html>
<!--
  文件名: guess.html
  作用: 猜拳页面 — 玩家选择石头/剪刀/布，AJAX 提交并轮询等待所有玩家完成猜拳
  路由: GET /game/{roomId}/{playerId}?phase=GUESS  (由 GameController.game() 根据游戏阶段返回)
  页面功能:
    1. 实时展示所有玩家状态卡片（昵称、HP、装备、位置、步数、血祭buff）
    2. 猜拳按钮区（石头✊、剪刀✌️、布✋），通过 AJAX POST 提交手势
    3. 已出拳后自动切换到等待状态，显示未出拳玩家列表
    4. 每2秒 AJAX 轮询房间状态（/api/room/{roomId}?playerId={playerId}）
    5. 操作记录实时更新（自动滚动到底部）
    6. 聊天功能（发送消息 + 实时显示）
    7. 游戏结束/玩家死亡时自动跳转
    8. 所有玩家出拳完毕 → phase 变为 ACTION → 自动跳转到行动页面
    9. 规则弹窗状态通过 sessionStorage 保持（页面刷新不丢失）
-->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>马刀游戏 - 猜拳</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .gesture-form { margin: 20px 0; }
        .gesture-form button { font-size: 20px; padding: 10px 20px; margin-right: 10px; cursor: pointer; }
        #waitMessage { display: none; }
    </style>
</head>
<body>

<!-- ========== 规则弹窗（引用公共 Thymeleaf 片段） ========== -->
<div th:replace="~{fragments/rules :: rulesPopup}"></div>

<!-- ========== 玩家状态区 ========== -->
<!-- 通过 JS updatePlayers() 动态渲染所有玩家卡片 -->
<div class="status-box">
    <h4>📋 玩家状态</h4>
    <div class="players-container" id="playersContainer">
        <p>加载中...</p>
    </div>
</div>

<!-- ========== 猜拳操作区 ========== -->
<!-- 初始显示，已出拳后隐藏 -->
<div id="guessArea">
    <h3>第 <span id="roundNumber" th:text="${room.round}">1</span> 回合</h3>
    <h2>请出拳：</h2>
    <div class="gesture-form">
        <!--
          三个猜拳按钮，通过 data-gesture 属性标记手势类型
          JS 通过 getAttribute('data-gesture') 读取，提交到 /api/guess/{roomId}/{playerId}
          手势对应:
            - data-gesture="石头": 赢剪刀，输布
            - data-gesture="剪刀": 赢布，输石头
            - data-gesture="布": 赢石头，输剪刀
        -->
        <button data-gesture="石头">✊ 石头</button>
        <button data-gesture="剪刀">✌️ 剪刀</button>
        <button data-gesture="布">✋ 布</button>
    </div>
</div>

<!-- ========== 等待区 ========== -->
<!-- 默认隐藏，玩家已出拳后显示，每2秒轮询更新未出拳玩家列表 -->
<div id="waitMessage">
    <h2>等待其他玩家猜拳...</h2>
    <div id="waitDetail"></div>
</div>

<!-- ========== 操作记录 ========== -->
<div class="log-box">
    <h4>📜 操作记录</h4>
    <div class="log-scroll" id="logScroll">
        <ul id="logList"></ul>
    </div>
</div>

<!-- ========== 聊天区域 ========== -->
<div class="chat-box">
    <h4>💬 聊天</h4>
    <div class="chat-scroll" id="chatScroll">
        <ul id="chatList"></ul>
    </div>
    <!--
      聊天表单
      参数:
        - chatInput: 文本输入框，autocomplete="off" 防止浏览器自动填充
        - 提交事件: 通过 addEventListener('submit') 拦截，AJAX POST 发送
      对应后端: POST /api/chat/{roomId}/{playerId}
    -->
    <form id="chatForm" class="chat-form">
        <input type="text" id="chatInput" placeholder="输入消息..." required autocomplete="off" style="width:70%;">
        <button type="submit">发送</button>
    </form>
</div>

<!-- ========== 核心交互脚本 ========== -->
<script th:inline="javascript" src="/js/common.js"></script>
<script th:inline="javascript">
    var roomId = /*[[${roomId}]]*/ '';
    var playerId = /*[[${playerId}]]*/ '';

    // ===== AJAX 状态刷新 =====
    /**
     * fetchState() — 异步获取房间状态并处理猜拳页面逻辑
     *
     * API 调用: GET /api/room/{roomId}?playerId={playerId}
     * 轮询间隔: 每 2 秒
     *
     * 响应 JSON 数据结构:
     *   - status:                String   — 房间状态: "WAITING" / "PLAYING" / "FINISHED"
     *   - phase:                 String   — 当前阶段: "GUESS" / "ACTION"
     *   - round:                 int      — 当前回合数
     *   - players:               Array    — 所有玩家信息 [{id, name, hp, steps, horse, knife, buff, location, alive, guess}, ...]
     *   - currentPlayerId:       String   — 当前玩家 UUID
     *   - currentPlayerAlive:    boolean  — 当前玩家是否存活
     *   - currentPlayerGuess:    String|null — 当前玩家手势 ("石头"/"剪刀"/"布"/null)
     *   - playersNotGuessed:     Array    — 未出拳玩家名称列表 (String[])
     *   - actionLogs:            Array    — 行动日志 (String[])
     *   - chatMessages:          Array    — 聊天消息 (String[])
     *
     * 页面逻辑:
     *   1. !data.status                       → 房间不存在 → 跳转 /
     *   2. data.status === 'FINISHED'              → 游戏结束   → 跳转结果页
     *   3. !data.currentPlayerAlive           → 玩家死亡   → 跳转观战页
     *   4. data.phase === 'GUESS'                 → 猜拳阶段:
     *      a. data.currentPlayerGuess == null → 显示猜拳按钮 (已出拳后会自动隐藏)
     *      b. data.currentPlayerGuess != null → 隐藏按钮，显示等待区 + 未出拳玩家列表
     *   5. data.phase === 'ACTION'               → 行动阶段 → 跳转行动页
     *
     * @async
     * 无参数，无返回值
     * 副作用：更新玩家卡片/日志/聊天 UI、可能触发页面跳转
     */
    async function fetchState() {
        try {
            var url = '/api/room/' + roomId + '?playerId=' + playerId;
            var res = await fetch(url);
            if (!res.ok) return;
            var data = await res.json();
            if (!data.status) { window.location.href = '/'; return; }

            updatePlayers(data.players);
            updateLogs(data.actionLogs);
            updateChat(data.chatMessages);

            if (data.status === 'FINISHED') { window.location.href = '/game/' + roomId + '/' + playerId; return; }
            if (!data.currentPlayerAlive) { window.location.href = '/game/' + roomId + '/' + playerId; return; }

            if (data.phase === 'GUESS') {
                // 随轮询更新回合数
                if (data.round) {
                    document.getElementById('roundNumber').textContent = data.round;
                }
                if (data.currentPlayerGuess == null) {
                    document.getElementById('guessArea').style.display = 'block';
                    document.getElementById('waitMessage').style.display = 'none';
                } else {
                    document.getElementById('guessArea').style.display = 'none';
                    document.getElementById('waitMessage').style.display = 'block';
                    var detailDiv = document.getElementById('waitDetail');
                    if (data.playersNotGuessed && data.playersNotGuessed.length > 0) {
                        var items = data.playersNotGuessed.map(function(n) { return '<li>' + escapeHtml(n) + '</li>'; }).join('');
                        detailDiv.innerHTML = '<p>等待以下玩家出拳：</p><ul>' + items + '</ul>';
                    } else {
                        detailDiv.innerHTML = '';
                    }
                }
                // data.phase === 'ACTION': 猜拳阶段结束，所有玩家已出拳，游戏进入行动阶段，跳转到行动页面
            } else if (data.phase === 'ACTION') {
                window.location.href = '/game/' + roomId + '/' + playerId;
            }

            restoreRulesPopup();
        } catch (e) { console.error('状态刷新失败', e); }
    }

    // ===== 猜拳提交 =====
    var gestureButtons = document.querySelectorAll('.gesture-form button');
    // ===== 为每个猜拳按钮绑定点击事件 =====
    // 回调参数 btn: HTMLButtonElement — 被点击的按钮元素
    // btn.getAttribute('data-gesture') 获取手势类型: "石头" / "剪刀" / "布"
    // 点击后通过 FormData 将 gesture 提交到 POST /api/guess/{roomId}/{playerId}
    gestureButtons.forEach(function(btn) {
        btn.addEventListener('click', async function() {
            var gesture = this.getAttribute('data-gesture');
            var formData = new FormData();
            formData.append('gesture', gesture);
            try {
                await fetch('/api/guess/' + roomId + '/' + playerId, { method: 'POST', body: formData });
                fetchState();
            } catch (e) { console.error('猜拳提交失败', e); }
        });
    });

    // ===== 聊天发送（使用 common.js 中的 initChatForm） =====
    initChatForm();

    // ===== 定时刷新 =====
    restoreRulesPopup();
    fetchState();
    setInterval(fetchState, 2000);
</script>
</body>
</html>
