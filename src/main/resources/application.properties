# 服务端口：默认 8080，避免与其他服务冲突
server.port=8080

# ===== Thymeleaf 模板引擎配置 =====
# 模板文件前缀：从 classpath:/templates/ 目录查找 HTML 模板
spring.thymeleaf.prefix=classpath:/templates/
# 模板文件后缀：默认 .html，无需在每个返回值中重复写
spring.thymeleaf.suffix=.html
# 开发模式禁用缓存：修改模板后无需重启即可生效（生产环境应设为 true）
spring.thymeleaf.cache=false

# ===== H2 数据库（嵌入式文件模式 + HikariCP 连接池） =====
# 数据库文件：./madao_db.mv.db（项目根目录）
# AUTO_SERVER=TRUE：允许多进程同时访问同一数据库文件（Web Console + 应用）
# 安全提示：生产环境不应使用空密码，应配置强密码并通过环境变量注入
spring.datasource.url=jdbc:h2:file:./madao_db;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
# HikariCP 连接池调优
# 最小空闲连接数，减少冷启动延迟
spring.datasource.hikari.minimum-idle=2
# 最大连接数，适应多房间并发
spring.datasource.hikari.maximum-pool-size=10
# 空闲连接超时 30 秒后回收
spring.datasource.hikari.idle-timeout=30000

# ===== H2 Web 控制台（开发调试用，访问 http://localhost:8080/h2-console） =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== 日志配置 =====
# 项目包级别日志：INFO 以上输出
logging.level.com.madao.game=INFO
# 日志格式：时间 [线程] 日志级别 Logger名 - 消息 换行
# %d{HH:mm:ss} = 时分秒  %thread = 线程名  %-5level = 左对齐5字符日志级别
# %logger{36} = 最多36字符类名  %msg%n = 消息内容+换行
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
