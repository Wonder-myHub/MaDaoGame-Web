<!DOCTYPE html>
<!--
  ================================================================================
  文件: result.html - 马刀游戏 · 游戏结束/结果页面
  ================================================================================

  【路由信息】
  请求路径: GET /game/{roomId}/{playerId}
  对应Controller: GameController.gamePage()
  分发条件: 当 room.status == "FINISHED"（游戏已结束，只剩一位存活玩家）
  -> 展示胜利者和最终游戏状态

  【页面功能】
  1. 展示胜利者名称（data.winner），带🏆奖杯弹跳动画
  2. 展示"🎉 游戏结束 🎉"发光文字动画
  3. 彩色纸屑飘落庆祝动画（100片随机颜色/大小/速度/延迟）
  4. 展示所有玩家的最终状态（HP、位置、装备）
  5. 展示完整操作记录（actionLogs）
  6. 支持查看聊天记录并发送消息
  7. "返回首页"按钮（离开房间）
  8. 规则弹窗查看游戏规则
  9. 每2秒轮询保持状态同步

  【后端注入变量（Thymeleaf Model 属性）】
  ${roomId}  : String - 当前房间ID（UUID），来源: GameController model.addAttribute("roomId", roomId)
  ${playerId} : String - 当前玩家ID（UUID），来源: GameController model.addAttribute("playerId", playerId)

  【前端行为总览】
  - 页面加载时触发 createConfetti() 创建100片纸屑动画
  - 调用 fetchState() 获取最终游戏状态
  - setInterval(fetchState, 2000) 每2秒轮询
  - 读取 data.winner 更新胜利者名称
  - 读取 data.players 渲染最终玩家状态
  - 房间不存在时跳转到首页 /

  【视觉效果总览】
  - 暗色渐变背景（#1a1a2e → #16213e → #0f3460）
  - 🏆 奖杯图标弹跳动画（bounce: 1.5s周期，translateY(-20px)）
  - "游戏结束"文字发光呼吸动画（glow: 2s周期，阴影从10px→80px）
  - 胜利者名称滑入动画（slideIn: 1s，从下方30px淡入）
  - 100片彩色纸屑飘落旋转动画（fall: 线性无限，translateY(100vh)+rotate(720deg)）
  - 面板使用 backdrop-filter: blur(5px) 毛玻璃效果

  ================================================================================
-->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <!--
      charset: UTF-8 统一字符编码
    -->
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>马刀游戏 - 游戏结束</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        body {
            margin: 0; padding: 20px; text-align: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white; min-height: 100vh;
        }
        .winner-section { margin: 30px auto; padding: 20px; }
        .trophy { font-size: 80px; animation: bounce 1.5s infinite; display: block; }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .winner-text {
            font-size: 48px; font-weight: bold; color: #ffd700;
            text-shadow: 0 0 20px #ff8c00, 0 0 40px #ff4500;
            margin: 20px 0; animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 10px #ffd700, 0 0 20px #ff8c00; }
            to { text-shadow: 0 0 30px #ffd700, 0 0 60px #ff4500, 0 0 80px #ff0000; }
        }
        .winner-name {
            font-size: 36px; background: rgba(255,215,0,0.2); display: inline-block;
            padding: 10px 30px; border-radius: 50px; border: 2px solid #ffd700;
            margin-top: 10px; animation: slideIn 1s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .confetti { position: fixed; top:-100px; width:10px; height:10px; background:#ff0; animation:fall linear infinite; z-index:0; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
        .status-box { margin: 30px auto; max-width: 700px; text-align: left; backdrop-filter: blur(5px); position: relative; z-index: 1; }
        .players-container { justify-content: center; padding: 15px; }
        .log-box { margin: 30px auto; max-width: 700px; text-align: left; position: relative; z-index: 1; }
        .chat-box { margin: 20px auto; max-width: 700px; text-align: left; position: relative; z-index: 1; }
        a { display: inline-block; margin-top: 20px; padding: 12px 30px; background: #ffd700; color: #1a1a2e; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 16px; position: relative; z-index: 1; transition: 0.3s; }
        a:hover { background: #ffed4a; transform: scale(1.05); }
    </style>
</head>
<body class="dark-theme">

<!-- ========== 规则弹窗（引用公共 Thymeleaf 片段） ========== -->
<div th:replace="fragments/rules :: rulesPopup"></div>

<!--
  ==================== 纸屑动画容器 ====================
  id="confettiContainer" — 纸屑粒子挂载点
  页面 load 事件触发 createConfetti()，在其中创建 100 个 .confetti div
  每个纸屑: position:fixed，从顶部外(-100px)飘落到底部外(100vh)
-->
<div id="confettiContainer"></div>

<!--
  ==================== 胜利者展示区 ====================
  包含三个动画元素:
    1. 🏆 奖杯图标 — bounce 弹跳动画
    2. 🎉 游戏结束 🎉 — glow 发光呼吸动画
    3. 胜利者名称 — slideIn 滑入动画，内容由 fetchState() 更新
-->
<div class="winner-section" id="winnerSection">
    <!-- 奖杯 emoji，弹跳动画 -->
    <span class="trophy">🏆</span>
    <!-- "游戏结束"发光文字 -->
    <div class="winner-text">🎉 游戏结束 🎉</div>
    <!--
      id="winnerName" — 胜利者名称容器
      初始显示 "加载中..."，fetchState() 中根据 data.winner 更新为 "胜利者：XXX"
      data.winner: String — 胜利者名称，来源: /api/room 响应中的 winner 字段
    -->
    <div class="winner-name" id="winnerName">加载中...</div>
</div>

<!--
  ==================== 最终状态面板 ====================
  展示所有玩家的最终状态（含存活和死亡玩家）
  由 updatePlayers(data.players) 动态渲染
  max-width: 700px 居中显示，带毛玻璃效果
-->
<div class="status-box">
    <h4>📋 最终状态</h4>
    <div class="players-container" id="playersContainer">
        <p>加载中...</p>
    </div>
</div>

<!--
  ==================== 操作记录面板 ====================
  展示完整的行动日志
  max-width: 700px 居中显示
-->
<div class="log-box">
    <h4>📜 操作记录</h4>
    <div class="log-scroll" id="logScroll">
        <ul id="logList"></ul>
    </div>
</div>

<!--
  ==================== 聊天面板 ====================
  游戏结束后仍可查看聊天记录和发送消息
  max-width: 700px 居中显示
-->
<div class="chat-box">
    <h4>💬 聊天</h4>
    <div class="chat-scroll" id="chatScroll">
        <ul id="chatList"></ul>
    </div>
    <!--
      聊天表单: POST /api/chat/{roomId}/{playerId}
    -->
    <form id="chatForm" class="chat-form">
        <input type="text" id="chatInput" placeholder="输入消息..." required autocomplete="off" style="width:70%;">
        <button type="submit">发送</button>
    </form>
</div>

<!--
  "返回首页"按钮 — 离开房间
  th:href: Thymeleaf 链接表达式
    @{/leave/{roomId}/{playerId}(roomId=${roomId}, playerId=${playerId})}
    渲染后如: /leave/a1b2c3d4.../e5f6g7h8...
  效果: 从房间中移除该玩家，跳转回首页 /
  样式: 金色胶囊按钮，悬停时放大 5% + 变亮
-->
<a th:href="@{/leave/{roomId}/{playerId}(roomId=${roomId}, playerId=${playerId})}" id="leaveLink">返回首页</a>

<!--
  ===================================================================
  页面交互脚本（Thymeleaf 内联模式）
  th:inline="javascript" 启用 Thymeleaf JS 内联，支持 /*[[...]]*/ 语法
  ===================================================================
-->
<script th:inline="javascript" src="/js/common.js"></script>
<script th:inline="javascript">

    var roomId = /*[[${roomId}]]*/ '';
    var playerId = /*[[${playerId}]]*/ '';

    function createConfetti() {
        var colors = ['#ffd700', '#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24', '#ff9ff3'];
        var container = document.getElementById('confettiContainer');
        for (var i = 0; i < 100; i++) {
            var confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.width = (Math.random() * 10 + 5) + 'px';
            confetti.style.height = (Math.random() * 10 + 5) + 'px';
            confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
            confetti.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(confetti);
        }
    }

    window.addEventListener('load', createConfetti);

    async function fetchState() {
        try {
            var url = '/api/room/' + roomId + '?playerId=' + playerId;
            var res = await fetch(url);
            if (!res.ok) return;
            var data = await res.json();
            if (!data.status) { window.location.href = '/'; return; }
            if (data.winner) { document.getElementById('winnerName').textContent = '胜利者：' + escapeHtml(data.winner); }
            updatePlayers(data.players);
            updateLogs(data.actionLogs);
            updateChat(data.chatMessages);
            restoreRulesPopup();
        } catch (e) { console.error(e); }
    }

    initChatForm();
    restoreRulesPopup();
    fetchState();
    setInterval(fetchState, 2000);
</script>
</body>
</html>
